<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="description" content="SchoolOS - نظام إدارة الحضور الذكي للمؤسسات التعليمية بتقنية المسح الذكي" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SchoolOS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#1e293b" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />
    
    <title>SchoolOS | نظام إدارة الحضور الذكي</title>
    
    <meta property="og:title" content="SchoolOS - نظام إدارة الحضور الذكي" />
    <meta property="og:description" content="نظام متكامل لإدارة حضور وغياب التلاميذ بتقنية المسح الذكي QR" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/icon-48x48.png" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-96x96.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Splash Screen Styles -->
    <style>
      #splash-screen {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(160deg, #1e293b 0%, #0f172a 60%, #1e293b 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      #splash-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #splash-screen .logo {
        width: 120px; height: 120px;
        border-radius: 24px;
        box-shadow: 0 0 60px rgba(59, 130, 246, 0.4);
        animation: pulse 2s ease-in-out infinite;
      }
      #splash-screen h1 {
        color: white;
        font-size: 2.2rem;
        font-weight: bold;
        margin-top: 1.5rem;
        font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        letter-spacing: -0.5px;
      }
      #splash-screen h1 span { color: #3b82f6; }
      #splash-screen p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
        margin-top: 0.5rem;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }
      #splash-screen .spinner {
        width: 32px; height: 32px;
        border: 3px solid rgba(59,130,246,0.3);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-top: 2rem;
      }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <!-- Splash Screen -->
    <div id="splash-screen">
      <img src="/icons/icon-192x192.png" alt="SchoolOS" class="logo" />
      <h1>School<span>OS</span></h1>
      <p>نظام إدارة الحضور الذكي</p>
      <div class="spinner"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(function() { splash.remove(); }, 500);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
